# render.yaml — WA Web Kantor Telegram Bot
# ==========================================
# Deploy di Render.com: https://dashboard.render.com/blueprints

services:
  - type: web
    name: wa-kantor-telegram
    env: docker
    region: singapore
    plan: free

    dockerfilePath: ./Dockerfile

    envVars:
      - key: TELEGRAM_TOKEN
        sync: false  # Isi manual di Render Dashboard

      - key: ADMIN_CHAT_ID
        sync: false  # Isi manual setelah dapat dari getUpdates

      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

    autoDeploy: true
    healthCheckPath: /status
